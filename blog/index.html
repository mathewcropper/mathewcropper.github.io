---
layout: default
title: Blog archive
---

<div class="container-fluid">
  <div class="container">
	<!-- This loops through the paginated posts -->
		<div class="row">
		  <div class="col-md-6 col-md-offset-3 mc-margin-top-50 mc-margin-bottom-50">
			  <h3 class="text-uppercase mc-text-900 text-center">ヽ(・∀・)ﾉ<br /><br />A list of everything</h3>
		  </div>
		  <div class="col-md-6 col-md-offset-3 mc-margin-bottom-50">
			  <p>
				  <ul class="posts list-unstyled">
					  {% for post in site.posts %}
					    <li><span>{{ post.date | date_to_string }}</span> » <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a></li>
					  {% endfor %}
					</ul>
			  </p>
		  </div>
		</div>
  </div>
</div>
